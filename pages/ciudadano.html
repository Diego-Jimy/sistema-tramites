<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Panel Ciudadano - Municipalidad de Yau</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="../css/styles.css"/>
</head>
<body class="bg-light">

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container-fluid">
      <span class="navbar-brand fw-bold">
        <i class="bi bi-building me-2"></i>Municipalidad de Yau
      </span>
      <div class="d-flex align-items-center gap-3">
        <span class="text-white" id="nav-nombre">Ciudadano</span>
        <!-- Campanita de notificaciones -->
        <button class="btn btn-outline-light btn-sm position-relative" onclick="toggleNotificaciones()">
          <i class="bi bi-bell"></i>
          <span class="badge bg-danger position-absolute top-0 start-100 translate-middle d-none" id="badge-notif">0</span>
        </button>
        <button class="btn btn-outline-light btn-sm" onclick="cerrarSesion()">
          <i class="bi bi-box-arrow-right me-1"></i>Salir
        </button>
      </div>
    </div>
  </nav>

  <!-- Panel de notificaciones desplegable -->
  <div id="panel-notificaciones" class="notif-panel d-none shadow-lg">
    <div class="p-3 border-bottom d-flex justify-content-between align-items-center">
      <strong><i class="bi bi-bell me-1"></i>Notificaciones</strong>
      <button class="btn btn-sm btn-link text-muted" onclick="marcarTodasLeidas()">Marcar todas leídas</button>
    </div>
    <div id="lista-notificaciones" class="p-2" style="max-height:300px;overflow-y:auto;">
      <p class="text-center text-muted py-3">Sin notificaciones</p>
    </div>
  </div>

  <div class="container-fluid py-4">
    <div class="row g-4">

      <!-- Sidebar -->
      <div class="col-lg-3">
        <div class="card border-0 shadow-sm">
          <div class="card-body text-center py-4">
            <div class="avatar-circle mx-auto mb-3">
              <i class="bi bi-person-fill display-4 text-primary"></i>
            </div>
            <h6 class="fw-bold mb-0" id="sidebar-nombre">Nombre Apellido</h6>
            <small class="text-muted" id="sidebar-dni">DNI: -</small>
          </div>
          <div class="list-group list-group-flush">
            <a href="#" class="list-group-item list-group-item-action active" onclick="mostrarSeccion('mis-tramites')">
              <i class="bi bi-file-text me-2"></i>Mis Trámites
            </a>
            <a href="#" class="list-group-item list-group-item-action" onclick="mostrarSeccion('nuevo-tramite')">
              <i class="bi bi-plus-circle me-2"></i>Nuevo Trámite
            </a>
            <a href="#" class="list-group-item list-group-item-action" onclick="mostrarSeccion('consultar')">
              <i class="bi bi-search me-2"></i>Consultar Estado
            </a>
          </div>
        </div>
      </div>

      <!-- Contenido principal -->
      <div class="col-lg-9">

        <!-- Sección: Mis Trámites -->
        <div id="seccion-mis-tramites">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="fw-bold mb-0"><i class="bi bi-file-text me-2"></i>Mis Trámites</h5>
            <button class="btn btn-outline-primary btn-sm" onclick="cargarMisTramites()">
              <i class="bi bi-arrow-clockwise me-1"></i>Actualizar
            </button>
          </div>
          <div id="tabla-tramites">
            <div class="text-center py-5">
              <div class="spinner-border text-primary" role="status"></div>
              <p class="mt-2 text-muted">Cargando trámites...</p>
            </div>
          </div>
        </div>

        <!-- Sección: Nuevo Trámite -->
        <div id="seccion-nuevo-tramite" class="d-none">
          <h5 class="fw-bold mb-3"><i class="bi bi-plus-circle me-2"></i>Registrar Nuevo Trámite</h5>
          <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
              <div id="alerta-tramite" class="alert d-none"></div>
              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label fw-semibold">Tipo de Trámite</label>
                  <select class="form-select" id="tipo-tramite">
                    <option value="">Selecciona un tipo...</option>
                    <option value="licencia">Licencia de Funcionamiento</option>
                    <option value="certificado">Certificado de Residencia</option>
                    <option value="permiso">Permiso de Construcción</option>
                    <option value="constancia">Constancia de Posesión</option>
                    <option value="partida">Partida de Nacimiento</option>
                    <option value="otros">Otros</option>
                  </select>
                </div>
                <div class="col-md-6">
                  <label class="form-label fw-semibold">Nivel de Urgencia</label>
                  <select class="form-select" id="urgencia">
                    <option value="normal">Normal</option>
                    <option value="urgente">Urgente</option>
                  </select>
                </div>
                <div class="col-12">
                  <label class="form-label fw-semibold">Descripción del Trámite</label>
                  <textarea class="form-control" id="descripcion" rows="3" placeholder="Describe el motivo y detalles de tu trámite..."></textarea>
                </div>
                <div class="col-12">
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="docs-completos" checked/>
                    <label class="form-check-label" for="docs-completos">
                      Confirmo que presento todos los documentos requeridos
                    </label>
                  </div>
                </div>
              </div>
              <!-- Preview de prioridad ML -->
              <div class="mt-3 p-3 bg-light rounded border" id="preview-prioridad" style="display:none">
                <strong><i class="bi bi-cpu me-1"></i>Prioridad estimada por IA:</strong>
                <span id="etiqueta-prioridad" class="ms-2 badge fs-6">-</span>
              </div>
              <div class="d-flex gap-2 mt-4">
                <button class="btn btn-outline-secondary" onclick="estimarPrioridad()">
                  <i class="bi bi-cpu me-1"></i>Estimar Prioridad
                </button>
                <button class="btn btn-primary" onclick="registrarTramite()">
                  <i class="bi bi-send me-1"></i>Enviar Trámite
                </button>
              </div>
            </div>
          </div>
        </div>

        <!-- Sección: Consultar Estado -->
        <div id="seccion-consultar" class="d-none">
          <h5 class="fw-bold mb-3"><i class="bi bi-search me-2"></i>Consultar Estado de Trámite</h5>
          <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
              <div class="input-group mb-3">
                <input type="text" class="form-control" id="tramite-id-consulta" placeholder="Ingresa el ID del trámite..."/>
                <button class="btn btn-primary" onclick="consultarTramite()">
                  <i class="bi bi-search me-1"></i>Consultar
                </button>
              </div>
              <div id="resultado-consulta"></div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/ciudadano.js"></script>
</body>
</html>
